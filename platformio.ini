; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = adafruit_feather_esp32s3
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-I .pio/libdeps/$PIOENV  # Helps clangd find libraries early
lib_deps = 
	mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display @ ^3.0.12
	adafruit/Adafruit GFX Library @ ^1.11.9
	bblanchon/ArduinoJson @ ^7

# 1. Force PIO to include the system toolchain headers in the JSON
# This prevents "file not found" errors for standard libraries like <stdint.h>
check_toolflow = clangtidy

# 2. Use an extra script if the default generation misses paths
extra_scripts = pre:setup_clangd.py